<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog — Code</title>
    <link rel="stylesheet" href="../style.css">
    
</head>

<body>
    <header>
        <nav>
            <a href="../index.html" class="nav-brand">Dev<span>Blog</span></a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../articles/index.html">Articles</a></li>
                <li><a href="../news/index.html">News</a></li>
                <li><a href="index.html" class="active">Code</a></li>
                <li><a href="../community/index.html">Community</a></li>
                <li><a href="../showcase/index.html">Showcase</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
            </ul>
            <div class="nav-right" id="nav-right">
                <a href="../login/index.html" class="btn">Login</a>
            </div>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>Code</h1>
            <span class="post-count" id="post-count"></span>
        </div>
        <div class="posts-grid" id="posts-container">
            <div class="loading-state">
                <div class="spinner"></div> Loading snippets...
            </div>
        </div>
    </div>

    <script src="../posts/supabase.js"></script>
    <script src="../posts/posts.js"></script>
    <script src="../posts/user-menu.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            initializeUserMenu();

            const container = document.getElementById("posts-container");
            const countEl = document.getElementById("post-count");
            try {
                const posts = await window.DevBlogPosts.getPosts({ type: "code" });
                countEl.textContent = posts.length ? `${posts.length} snippet${posts.length !== 1 ? "s" : ""}` : "";
                window.DevBlogPosts.renderPosts(container, posts, { emptyText: "No code snippets yet.", showType: false });
            } catch (e) {
                container.innerHTML = `<p class="empty-state">Could not load code posts. Check your connection.</p>`;
            }
        });
    </script>
    
</body>

</html>
