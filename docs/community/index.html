<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog — Community</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="nav-brand">Dev<span>Blog</span></a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../articles/index.html">Articles</a></li>
                <li><a href="../news/index.html">News</a></li>
                <li><a href="../code/index.html">Code</a></li>
                <li><a href="../community/index.html">Community</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
            </ul>
            <div class="nav-right" id="nav-right">
                <a href="../login/index.html" class="btn">Login</a>
            </div>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="community-header">
            <div class="page-header page-header--compact">
                <h1>Community</h1>
                <p class="page-subtitle">Posts from our members</p>
            </div>
            <div class="user-bar" id="user-bar">
                <!-- filled by JS -->
            </div>
        </div>

        <div id="posts-container" class="posts-grid">
            <div class="loading-state"><div class="spinner"></div> Loading...</div>
        </div>
    </div>

    <script src="../posts/supabase.js"></script>
    <script src="../posts/posts.js"></script>
    <script src="../posts/user-menu.js"></script>
    <script>
        const user = window.SupabaseClient.getCurrentUser();
        const userBar = document.getElementById("user-bar");

        document.addEventListener("DOMContentLoaded", () => {
            initializeUserMenu();
        });

        if (user) {
            userBar.innerHTML = `
                <a href="../publish/index.html" class="btn">+ New Post</a>
            `;
        } else {
            userBar.innerHTML = `<a href="../login/index.html" class="btn">Sign In to Post</a>`;
        }

        // Load community posts
        async function loadPosts() {
            const container = document.getElementById("posts-container");
            try {
                const posts = await window.SupabaseClient.supabaseFetch(
                    "community_posts?order=created_at.desc&select=*,profiles(username,avatar_url)"
                );

                if (!posts || posts.length === 0) {
                    container.innerHTML = `<p class="empty-state">No community posts yet. <a href="../login/index.html">Sign in</a> to be the first!</p>`;
                    return;
                }

                container.innerHTML = "";
                posts.forEach(post => {
                    const profile = post.profiles;
                    const card = document.createElement("article");
                    card.className = "post-card";
                    card.style.cursor = "pointer";
                    const preview = post.content.split("\n")[0];
                    const isOwner = String(user?.id) === String(post.user_id);
                    card.innerHTML = `
                        <div class="post-card__heading">
                            <h3 class="post-card__title">${escapeHtml(post.title)}</h3>
                            <span class="post-badge">${window.DevBlogPosts.toLabel(post.type)}</span>
                        </div>
                        <p class="post-preview">${escapeHtml(preview)}...</p>
                        <div class="post-footer">
                            <span class="post-meta">${window.DevBlogPosts.formatDate(post.created_at)}</span>
                            <span class="post-author">by <a href="../profile/index.html?id=${post.user_id}">${escapeHtml(profile?.username || "Unknown")}</a></span>
                        </div>
                        ${isOwner ? `
                            <div class="post-card__actions">
                                <button class="btn btn--secondary btn--small" data-action="edit" data-id="${post.id}">Edit</button>
                                <button class="btn btn--danger btn--small" data-action="delete" data-id="${post.id}">Delete</button>
                            </div>
                        ` : ""}
                    `;
                    card.addEventListener("click", async (e) => {
                        const actionBtn = e.target.closest("button[data-action]");
                        if (actionBtn) {
                            e.stopPropagation();
                            const action = actionBtn.dataset.action;
                            const postId = actionBtn.dataset.id;

                            if (action === "edit") {
                                window.location.href = `../publish/index.html?id=${postId}`;
                                return;
                            }

                            if (action === "delete") {
                                if (!confirm("Delete this post? This cannot be undone.")) return;
                                try {
                                    await window.SupabaseClient.deleteCommunityPost(postId);
                                    card.remove();
                                    if (!container.querySelector(".post-card")) {
                                        container.innerHTML = `<p class="empty-state">No community posts yet. <a href="../login/index.html">Sign in</a> to be the first!</p>`;
                                    }
                                } catch (err) {
                                    alert(`Delete failed: ${err.message}`);
                                }
                                return;
                            }
                        }
                        if (e.target.tagName === "A") return;
                        window.DevBlogPosts.openPostModal(post);
                    });
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="empty-state">Failed to load posts: ${err.message}</p>`;
            }
        }

        function escapeHtml(str) {
            return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        loadPosts();
    </script>
</body>
</html>
