<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ither — News</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="nav-brand">I<span>ther</span></a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../articles/index.html">Articles</a></li>
                <li><a href="index.html" class="active">News</a></li>
                <li><a href="../code/index.html">Code</a></li>
                <li><a href="../community/index.html">Community</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
            </ul>
            <div class="nav-right" id="nav-right">
                <a href="../login/index.html" class="btn">Login</a>
            </div>
        </nav>
    </header>

    <div class="page-wrapper">
        <div class="page-header">
            <h1>News</h1>
            <span class="post-count" id="post-count"></span>
        </div>
        <div class="posts-grid" id="posts-container">
            <div class="loading-state"><div class="spinner"></div> Loading news...</div>
        </div>
    </div>

    <script src="../posts/supabase.js"></script>
    <script src="../posts/posts.js"></script>
    <script src="../posts/user-menu.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            initializeUserMenu();
            
            const container = document.getElementById("posts-container");
            const countEl = document.getElementById("post-count");
            try {
                const posts = await window.DevBlogPosts.getPosts({ type: "news" });
                countEl.textContent = posts.length ? `${posts.length} item${posts.length !== 1 ? "s" : ""}` : "";
                window.DevBlogPosts.renderPosts(container, posts, { emptyText: "No news yet.", showType: false });
            } catch (e) {
                container.innerHTML = `<p class="empty-state">Could not load news. Check your connection.</p>`;
            }
        });
    </script>
</body>
</html>
