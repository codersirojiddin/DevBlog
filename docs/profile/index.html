<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog — Profile</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="nav-brand">Dev<span>Blog</span></a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../articles/index.html">Articles</a></li>
                <li><a href="../news/index.html">News</a></li>
                <li><a href="../code/index.html">Code</a></li>
                <li><a href="../community/index.html">Community</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
            </ul>
            <div class="nav-right" id="nav-right"></div>
        </nav>
    </header>

    <div class="page-wrapper">
        <div id="profile-header" class="profile-header">
            <div class="loading-state"><div class="spinner"></div> Loading...</div>
        </div>

        <!-- Edit form (only shown to profile owner) -->
        <div class="edit-profile-form" id="edit-form">
            <h3>Edit Profile</h3>
            <div class="form-row">
                <label>Username</label>
                <input type="text" id="edit-username" placeholder="yourname">
            </div>
            <div class="form-row">
                <label>Bio</label>
                <textarea id="edit-bio" placeholder="Tell us about yourself..." rows="3"></textarea>
            </div>
            <div class="form-row">
                <label>Avatar URL</label>
                <input type="text" id="edit-avatar" placeholder="https://...">
            </div>
            <div class="profile-actions">
                <button class="btn" id="save-profile-btn">Save</button>
                <button class="btn btn--secondary" id="cancel-edit-btn">Cancel</button>
            </div>
            <p class="status" id="edit-status"></p>
        </div>

        <h2 class="section-title">Posts</h2>
        <div id="user-posts" class="posts-grid">
            <div class="loading-state"><div class="spinner"></div> Loading...</div>
        </div>
    </div>

    <script src="../posts/supabase.js"></script>
    <script src="../posts/posts.js"></script>
    <script src="../posts/user-menu.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const profileId = params.get("id");
        const currentUser = window.SupabaseClient.getCurrentUser();

        if (!profileId) window.location.href = "../community/index.html";

        document.addEventListener("DOMContentLoaded", () => {
            initializeUserMenu();
        });

        const isOwner = currentUser?.id === profileId;

        async function loadProfile() {
            const headerEl = document.getElementById("profile-header");
            try {
                const data = await window.SupabaseClient.supabaseFetch(`profiles?id=eq.${profileId}`);
                const profile = data?.[0];
                if (!profile) { headerEl.innerHTML = `<p>User not found.</p>`; return; }

                const avatarContent = profile.avatar_url
                    ? `<img src="${profile.avatar_url}" alt="${profile.username}">`
                    : profile.username[0].toUpperCase();

                headerEl.innerHTML = `
                    <div class="avatar-large">${avatarContent}</div>
                    <div class="profile-info">
                        <h2>${escapeHtml(profile.username)}</h2>
                        ${profile.bio ? `<p class="profile-bio">${escapeHtml(profile.bio)}</p>` : ""}
                        <p class="profile-joined">Joined ${window.DevBlogPosts.formatDate(profile.created_at)}</p>
                        ${isOwner ? `<button class="btn btn--secondary" id="edit-btn">Edit Profile</button>` : ""}
                    </div>
                `;

                if (isOwner) {
                    document.getElementById("edit-btn").addEventListener("click", () => {
                        document.getElementById("edit-username").value = profile.username;
                        document.getElementById("edit-bio").value = profile.bio || "";
                        document.getElementById("edit-avatar").value = profile.avatar_url || "";
                        document.getElementById("edit-form").classList.add("visible");
                    });
                }

                document.title = `DevBlog — ${profile.username}`;
            } catch (err) {
                headerEl.innerHTML = `<p>Failed to load profile: ${err.message}</p>`;
            }
        }

        async function loadUserPosts() {
            const container = document.getElementById("user-posts");
            try {
                const posts = await window.SupabaseClient.supabaseFetch(
                    `community_posts?user_id=eq.${profileId}&order=created_at.desc`
                );

                if (!posts || posts.length === 0) {
                    container.innerHTML = `<p class="empty-state">No posts yet.</p>`;
                    return;
                }

                container.innerHTML = "";
                posts.forEach((post, idx) => {
                    const card = document.createElement("article");
                    card.className = "post-card";
                    card.dataset.id = post.id;
                    
                    const preview = post.content.split("\n")[0];
                    const hasMore = post.content.split("\n").length > 1;

                    card.innerHTML = `
                        <div class="post-card__heading">
                            <h3 class="post-card__title">${escapeHtml(post.title)}</h3>
                            <span class="post-badge">${window.DevBlogPosts.toLabel(post.type)}</span>
                        </div>
                        <p class="post-preview">${escapeHtml(preview)}${hasMore ? "..." : ""}</p>
                        <div class="post-footer">
                            <span class="post-meta">${window.DevBlogPosts.formatDate(post.created_at)}</span>
                        </div>
                        ${isOwner ? `
                            <div class="post-card__actions">
                                <button class="btn btn--secondary btn--small" data-action="edit" data-id="${post.id}">Edit</button>
                                <button class="btn btn--danger btn--small" data-action="delete" data-id="${post.id}">Delete</button>
                            </div>
                        ` : ""}
                    `;

                    card.addEventListener("click", async (e) => {
                        const actionBtn = e.target.closest("button[data-action]");
                        if (actionBtn) {
                            e.stopPropagation();
                            const action = actionBtn.dataset.action;
                            const postId = actionBtn.dataset.id;

                            if (action === "edit") {
                                window.location.href = `../publish/index.html?id=${postId}`;
                                return;
                            }

                            if (action === "delete") {
                                if (!confirm("Delete this post? This cannot be undone.")) return;
                                try {
                                    await window.SupabaseClient.deleteCommunityPost(postId);
                                    card.remove();
                                    if (!container.querySelector(".post-card")) {
                                        container.innerHTML = `<p class="empty-state">No posts yet.</p>`;
                                    }
                                } catch (err) {
                                    alert(`Delete failed: ${err.message}`);
                                }
                                return;
                            }
                        }
                        window.DevBlogPosts.openPostModal(post);
                    });

                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="empty-state">Failed to load posts: ${err.message}</p>`;
            }
        }

        // Save profile edits
        document.getElementById("save-profile-btn").addEventListener("click", async () => {
            const username = document.getElementById("edit-username").value.trim();
            const bio = document.getElementById("edit-bio").value.trim();
            const avatar_url = document.getElementById("edit-avatar").value.trim();
            const status = document.getElementById("edit-status");

            if (!username) { status.textContent = "Username is required."; status.className = "status status--error"; return; }
            status.textContent = "Saving..."; status.className = "status";
            try {
                await window.SupabaseClient.supabaseFetch(`profiles?id=eq.${profileId}`, {
                    method: "PATCH",
                    body: JSON.stringify({ username, bio, avatar_url }),
                    prefer: "return=minimal"
                });
                status.textContent = "✓ Saved!"; status.className = "status status--ok";
                document.getElementById("edit-form").classList.remove("visible");
                loadProfile();
            } catch (err) {
                status.textContent = err.message; status.className = "status status--error";
            }
        });

        document.getElementById("cancel-edit-btn").addEventListener("click", () => {
            document.getElementById("edit-form").classList.remove("visible");
        });

        function escapeHtml(str) {
            return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        loadProfile();
        loadUserPosts();
    </script>
</body>
</html>
