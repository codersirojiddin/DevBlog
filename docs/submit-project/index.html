<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBlog — Submit Project</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .submit-wrapper {
            max-width: 680px;
            margin: 48px auto;
            padding: 0 20px 60px;
        }

        .submit-wrapper h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .submit-wrapper p.subtitle {
            color: #555;
            margin-bottom: 32px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: #333;
        }

        .form-group label span {
            color: #ef4444;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border 0.15s;
            box-sizing: border-box;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-hint {
            font-size: 0.78rem;
            color: #888;
            margin-top: 4px;
        }

        /* Tech stack tags input */
        .tags-input-wrapper {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            background: #fafafa;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            cursor: text;
            transition: border 0.15s;
        }

        .tags-input-wrapper:focus-within {
            border-color: #2563eb;
            background: white;
        }

        .tag-chip {
            background: #eff6ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            padding: 3px 8px;
            font-size: 0.8rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tag-chip button {
            background: none;
            border: none;
            cursor: pointer;
            color: #93c5fd;
            font-size: 0.9rem;
            padding: 0;
            line-height: 1;
        }

        .tag-chip button:hover { color: #2563eb; }

        .tags-input {
            border: none !important;
            outline: none;
            padding: 4px !important;
            background: transparent !important;
            font-size: 0.9rem;
            min-width: 120px;
            flex: 1;
        }

        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .status-options {
            display: flex;
            gap: 10px;
        }

        .status-option {
            flex: 1;
            text-align: center;
        }

        .status-option input[type="radio"] { display: none; }

        .status-option label {
            display: block;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.15s;
            color: #555;
        }

        .status-option input:checked + label {
            border-color: #2563eb;
            background: #eff6ff;
            color: #2563eb;
        }

        .submit-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-submit {
            flex: 1;
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }

        .btn-cancel {
            padding: 12px 24px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            font-size: 1rem;
            cursor: pointer;
            color: #555;
            transition: background 0.15s;
        }

        .btn-cancel:hover { background: #f8fafc; }

        .status-msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .status-msg.success { background: #d1fae5; color: #065f46; display: block; }
        .status-msg.error { background: #fee2e2; color: #991b1b; display: block; }

        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        .role-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: #f9fafb;
        }

        .role-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .role-header input {
            flex: 1;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 0.9rem;
        }

        .remove-role-btn {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 1rem;
        }

        .role-card textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 8px;
            font-size: 0.9rem;
            margin-bottom: 8px;
            resize: vertical;
        }

        .role-skills {
            margin-bottom: 8px;
        }

        .role-skills input {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 0.8rem;
            width: 100%;
            margin-bottom: 4px;
        }

        .role-skills-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .skill-tag {
            background: #dbeafe;
            color: #1e40af;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .skill-tag button {
            background: none;
            border: none;
            cursor: pointer;
            color: #93c5fd;
            font-size: 0.8rem;
        }

        .role-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 80px;
            gap: 8px;
        }

        .role-details select,
        .role-details input {
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 0.8rem;
        }

        .btn-secondary {
            background: #6b7280;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .btn-secondary:hover { background: #4b5563; }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="../index.html" class="nav-brand">Dev<span>Blog</span></a>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="../articles/index.html">Articles</a></li>
                <li><a href="../news/index.html">News</a></li>
                <li><a href="../code/index.html">Code</a></li>
                <li><a href="../community/index.html">Community</a></li>
                <li><a href="../showcase/index.html">Showcase</a></li>
                <li><a href="../showcase/index.html">Showcase</a></li>
                <li><a href="../about/index.html">About</a></li>
                <li><a href="../contact/index.html">Contact</a></li>
            </ul>
            <div class="nav-right" id="nav-right"></div>
        </nav>
    </header>

    <div class="submit-wrapper">
        <h1>🚀 Submit Your Project</h1>
        <p class="subtitle">Show the world what you've built!</p>
        <div id="main-content"></div>
    </div>

    <script src="../posts/supabase.js"></script>
    <script src="../posts/user-menu.js"></script>
    <script>
        const currentUser = window.SupabaseClient.getCurrentUser();
        const mainContent = document.getElementById("main-content");

        document.addEventListener("DOMContentLoaded", () => {
            initializeUserMenu();
        });

        // If not logged in, show prompt
        if (!currentUser) {
            mainContent.innerHTML = `
                <div class="login-prompt">
                    <p>You need to be logged in to submit a project.</p>
                    <br>
                    <a href="../login/index.html" class="btn">Log In</a>
                </div>
            `;
        } else {
            renderForm();
        }

        // Tech stack tags
        let techStack = [];

        // Roles
        let roles = [];

        function renderForm() {
            mainContent.innerHTML = `
                <div class="form-card">

                    <div class="form-group">
                        <label>Project Title <span>*</span></label>
                        <input type="text" id="title" placeholder="e.g. ither.online" maxlength="80">
                    </div>

                    <div class="form-group">
                        <label>Tagline <span>*</span></label>
                        <input type="text" id="tagline" placeholder="One sentence that describes your project" maxlength="120">
                        <p class="form-hint">Keep it short and punchy!</p>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Tell us more about the project — what problem it solves, how you built it, what you learned..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Tech Stack</label>
                        <div class="tags-input-wrapper" id="tags-wrapper">
                            <input class="tags-input" id="tech-input" placeholder="Type a tech and press Enter (e.g. React)">
                        </div>
                        <p class="form-hint">Press Enter or comma to add each technology</p>
                    </div>

                    <div class="form-group">
                        <label>Team Roles Needed</label>
                        <div id="roles-container"></div>
                        <button type="button" id="add-role-btn" class="btn-secondary">+ Add Role</button>
                        <p class="form-hint">Define roles you need for your project team</p>
                    </div>

                    <div class="form-row-2">
                        <div class="form-group">
                            <label>Live Demo URL</label>
                            <input type="url" id="live-url" placeholder="https://yourproject.com">
                        </div>
                        <div class="form-group">
                            <label>GitHub Repo URL</label>
                            <input type="url" id="github-url" placeholder="https://github.com/you/repo">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Thumbnail URL</label>
                        <input type="url" id="thumbnail-url" placeholder="https://i.imgur.com/yourimage.png">
                        <p class="form-hint">Paste a direct image link. Use imgur.com to upload images for free.</p>
                    </div>

                    <div class="form-group">
                        <label>Project Status</label>
                        <div class="status-options">
                            <div class="status-option">
                                <input type="radio" name="status" id="s-idea" value="idea" checked>
                                <label for="s-idea">💡 Idea</label>
                            </div>
                            <div class="status-option">
                                <input type="radio" name="status" id="s-progress" value="in-progress">
                                <label for="s-progress">🔨 In Progress</label>
                            </div>
                            <div class="status-option">
                                <input type="radio" name="status" id="s-mvp" value="mvp">
                                <label for="s-mvp">🚧 MVP</label>
                            </div>
                            <div class="status-option">
                                <input type="radio" name="status" id="s-launched" value="launched">
                                <label for="s-launched">🚀 Launched</label>
                            </div>
                        </div>
                    </div>

                    <div class="submit-actions">
                        <button class="btn-submit" id="submit-btn">🚀 Submit Project</button>
                        <button class="btn-cancel" onclick="window.location.href='../showcase/index.html'">Cancel</button>
                    </div>

                    <div class="status-msg" id="status-msg"></div>
                </div>
            `;

            // Tech stack tag input logic
            const techInput = document.getElementById("tech-input");
            const tagsWrapper = document.getElementById("tags-wrapper");

            tagsWrapper.addEventListener("click", () => techInput.focus());

            techInput.addEventListener("keydown", (e) => {
                if (e.key === "Enter" || e.key === ",") {
                    e.preventDefault();
                    addTag(techInput.value.trim().replace(",", ""));
                    techInput.value = "";
                }
                if (e.key === "Backspace" && techInput.value === "" && techStack.length > 0) {
                    removeTag(techStack[techStack.length - 1]);
                }
            });

            // Submit
            document.getElementById("submit-btn").addEventListener("click", submitProject);

            // Add role button
            document.getElementById("add-role-btn").addEventListener("click", addRole);
        }

        function addRole() {
            const role = {
                id: Date.now(),
                title: "",
                description: "",
                skills: [],
                level: "beginner",
                commitment: "part_time",
                compensation: "volunteer",
                max_positions: 1
            };
            roles.push(role);
            renderRoles();
        }

        function removeRole(roleId) {
            roles = roles.filter(r => r.id !== roleId);
            renderRoles();
        }

        function updateRole(roleId, field, value) {
            const role = roles.find(r => r.id === roleId);
            if (role) {
                role[field] = value;
            }
        }

        function addRoleSkill(roleId, skill) {
            const role = roles.find(r => r.id === roleId);
            if (role && skill && !role.skills.includes(skill)) {
                role.skills.push(skill);
                renderRoles();
            }
        }

        function removeRoleSkill(roleId, skill) {
            const role = roles.find(r => r.id === roleId);
            if (role) {
                role.skills = role.skills.filter(s => s !== skill);
                renderRoles();
            }
        }

        function renderRoles() {
            const container = document.getElementById("roles-container");
            container.innerHTML = roles.map(role => `
                <div class="role-card" data-role-id="${role.id}">
                    <div class="role-header">
                        <input type="text" placeholder="Role Title (e.g. Frontend Developer)" value="${role.title}" onchange="updateRole(${role.id}, 'title', this.value)">
                        <button type="button" onclick="removeRole(${role.id})" class="remove-role-btn">×</button>
                    </div>
                    <textarea placeholder="Role description..." onchange="updateRole(${role.id}, 'description', this.value)">${role.description}</textarea>
                    <div class="role-skills">
                        <input type="text" placeholder="Add skill and press Enter..." onkeydown="if(event.key==='Enter'){event.preventDefault();addRoleSkill(${role.id}, this.value.trim()); this.value=''}">
                        <div class="role-skills-tags">
                            ${role.skills.map(skill => `<span class="skill-tag">${skill} <button onclick="removeRoleSkill(${role.id}, '${skill}')">×</button></span>`).join('')}
                        </div>
                    </div>
                    <div class="role-details">
                        <select onchange="updateRole(${role.id}, 'level', this.value)">
                            <option value="beginner" ${role.level === 'beginner' ? 'selected' : ''}>Beginner</option>
                            <option value="intermediate" ${role.level === 'intermediate' ? 'selected' : ''}>Intermediate</option>
                            <option value="expert" ${role.level === 'expert' ? 'selected' : ''}>Expert</option>
                        </select>
                        <select onchange="updateRole(${role.id}, 'commitment', this.value)">
                            <option value="part_time" ${role.commitment === 'part_time' ? 'selected' : ''}>Part-time</option>
                            <option value="full_time" ${role.commitment === 'full_time' ? 'selected' : ''}>Full-time</option>
                            <option value="contract" ${role.commitment === 'contract' ? 'selected' : ''}>Contract</option>
                        </select>
                        <select onchange="updateRole(${role.id}, 'compensation', this.value)">
                            <option value="volunteer" ${role.compensation === 'volunteer' ? 'selected' : ''}>Volunteer</option>
                            <option value="equity" ${role.compensation === 'equity' ? 'selected' : ''}>Equity</option>
                            <option value="paid" ${role.compensation === 'paid' ? 'selected' : ''}>Paid</option>
                        </select>
                        <input type="number" min="1" value="${role.max_positions}" onchange="updateRole(${role.id}, 'max_positions', parseInt(this.value))" placeholder="#">
                    </div>
                </div>
            `).join('');
        }

        function addTag(value) {
            if (!value || techStack.includes(value) || techStack.length >= 10) return;
            techStack.push(value);
            renderTags();
        }

        function removeTag(value) {
            techStack = techStack.filter(t => t !== value);
            renderTags();
        }

        function renderTags() {
            const wrapper = document.getElementById("tags-wrapper");
            const input = document.getElementById("tech-input");
            wrapper.querySelectorAll(".tag-chip").forEach(c => c.remove());
            techStack.forEach(tag => {
                const chip = document.createElement("span");
                chip.className = "tag-chip";
                chip.innerHTML = `${tag} <button type="button" onclick="removeTag('${tag}')">×</button>`;
                wrapper.insertBefore(chip, input);
            });
        }

        window.removeTag = removeTag;

        async function submitProject() {
            const btn = document.getElementById("submit-btn");

            const title = document.getElementById("title").value.trim();
            const tagline = document.getElementById("tagline").value.trim();
            const description = document.getElementById("description").value.trim();
            const live_url = document.getElementById("live-url").value.trim();
            const github_url = document.getElementById("github-url").value.trim();
            const thumbnail_url = document.getElementById("thumbnail-url").value.trim();
            const status = document.querySelector('input[name="status"]:checked').value;

            if (!title) { showStatus("Project title is required.", "error"); return; }
            if (!tagline) { showStatus("Tagline is required.", "error"); return; }

            btn.disabled = true;
            btn.textContent = "Submitting...";

            try {
                const projectData = await window.SupabaseClient.supabaseFetch("projects", {
                    method: "POST",
                    body: JSON.stringify({
                        user_id: currentUser.id,
                        title,
                        tagline,
                        description,
                        tech_stack: techStack,
                        live_url: live_url || null,
                        github_url: github_url || null,
                        thumbnail_url: thumbnail_url || null,
                        status
                    }),
                    prefer: "return=representation"
                });

                const projectId = projectData?.[0]?.id || null;
                if (!projectId) {
                    throw new Error("Project created but project ID could not be retrieved.");
                }

                // Submit roles if any
                if (roles.length > 0) {
                    try {
                        for (const role of roles) {
                            await window.SupabaseClient.supabaseFetch("project_roles", {
                                method: "POST",
                                body: JSON.stringify({
                                    project_id: projectId,
                                    title: role.title,
                                    description: role.description,
                                    skills: role.skills,
                                    level: role.level,
                                    commitment: role.commitment,
                                    compensation: role.compensation,
                                    max_positions: role.max_positions,
                                    filled_positions: 0
                                }),
                                prefer: "return=minimal"
                            });
                        }
                    } catch (rolesError) {
                        // Show the REAL error message so we can debug
                        console.error("Roles save error:", rolesError);
                        showStatus(`Project created but roles failed: ${rolesError.message}`, "error");
                        btn.disabled = false;
                        btn.textContent = "🚀 Submit Project";
                        return;
                    }
                }

                showStatus("🎉 Project submitted successfully! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "../showcase/index.html";
                }, 1500);

            } catch (err) {
                console.error("Submit error:", err);
                showStatus("Failed to submit: " + err.message, "error");
                btn.disabled = false;
                btn.textContent = "🚀 Submit Project";
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById("status-msg");
            el.textContent = msg;
            el.className = `status-msg ${type}`;
        }
    </script>
</body>
</html>
